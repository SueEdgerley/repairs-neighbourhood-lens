<svg width="640" height="360" viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A maintenance worker carrying out repairs at a home">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E6F7F5"/>
      <stop offset="1" stop-color="#F4FBFA"/>
    </linearGradient>
  </defs>

  <!-- Background panel -->
  <rect x="0" y="0" width="640" height="360" rx="24" fill="url(#sky)"/>

  <!-- Soft sun -->
  <circle cx="540" cy="78" r="34" fill="#FCD9A1" opacity="0.7"/>

  <!-- Ground -->
  <rect x="0" y="296" width="640" height="64" rx="0" fill="#0E6E63" opacity="0.08"/>
  <rect x="0" y="312" width="640" height="48" fill="#0E6E63" opacity="0.06"/>

  <!-- House -->
  <g>
    <rect x="118" y="150" width="230" height="160" rx="6" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <path d="M104 152 L233 78 L362 152 Z" fill="#0E6E63"/>
    <path d="M233 78 L362 152 H300 L233 112 Z" fill="#13A89E" opacity="0.9"/>
    <!-- chimney -->
    <rect x="300" y="92" width="22" height="40" fill="#0B5A51"/>
    <!-- door -->
    <rect x="158" y="232" width="46" height="78" rx="4" fill="#0E6E63"/>
    <circle cx="196" cy="272" r="3" fill="#FCD9A1"/>
    <!-- windows -->
    <rect x="238" y="178" width="74" height="56" rx="4" fill="#DCEFFB" stroke="#9DC8E8" stroke-width="2"/>
    <line x1="275" y1="178" x2="275" y2="234" stroke="#9DC8E8" stroke-width="2"/>
    <line x1="238" y1="206" x2="312" y2="206" stroke="#9DC8E8" stroke-width="2"/>
    <rect x="238" y="250" width="74" height="40" rx="4" fill="#DCEFFB" stroke="#9DC8E8" stroke-width="2"/>
  </g>

  <!-- Ladder -->
  <g stroke="#C99A4E" stroke-width="6" stroke-linecap="round">
    <line x1="372" y1="150" x2="402" y2="306"/>
    <line x1="398" y1="150" x2="428" y2="306"/>
    <line x1="380" y1="186" x2="406" y2="186" stroke-width="5"/>
    <line x1="386" y1="222" x2="412" y2="222" stroke-width="5"/>
    <line x1="392" y1="258" x2="418" y2="258" stroke-width="5"/>
  </g>

  <!-- Worker -->
  <g>
    <!-- legs -->
    <rect x="455" y="244" width="18" height="60" rx="6" fill="#334155"/>
    <rect x="481" y="244" width="18" height="60" rx="6" fill="#1F2937"/>
    <rect x="451" y="298" width="26" height="12" rx="4" fill="#0B1220"/>
    <rect x="479" y="298" width="26" height="12" rx="4" fill="#0B1220"/>
    <!-- body / hi-vis -->
    <rect x="448" y="180" width="58" height="74" rx="14" fill="#13A89E"/>
    <rect x="448" y="210" width="58" height="12" fill="#FCD9A1"/>
    <!-- arm holding wrench -->
    <rect x="498" y="190" width="46" height="14" rx="7" fill="#13A89E" transform="rotate(28 498 190)"/>
    <!-- head -->
    <circle cx="477" cy="158" r="20" fill="#F5C9A6"/>
    <!-- hard hat -->
    <path d="M455 150 a22 22 0 0 1 44 0 Z" fill="#F59E0B"/>
    <rect x="451" y="148" width="52" height="7" rx="3.5" fill="#D97706"/>
  </g>

  <!-- Wrench in hand -->
  <g transform="rotate(28 540 172)">
    <rect x="528" y="166" width="30" height="9" rx="4" fill="#94A3B8"/>
    <path d="M558 162 a9 9 0 1 1 0 18 l-4 -5 a4 4 0 1 0 0 -8 Z" fill="#64748B"/>
  </g>

  <!-- Toolbox -->
  <g>
    <rect x="60" y="270" width="74" height="40" rx="6" fill="#F59E0B"/>
    <rect x="60" y="270" width="74" height="12" rx="6" fill="#D97706"/>
    <rect x="86" y="258" width="22" height="14" rx="4" fill="#0E6E63"/>
    <rect x="92" y="288" width="10" height="10" rx="2" fill="#FFFFFF"/>
  </g>

  <!-- Bush -->
  <g fill="#0E6E63" opacity="0.5">
    <circle cx="568" cy="300" r="20"/>
    <circle cx="592" cy="304" r="16"/>
    <circle cx="548" cy="306" r="14"/>
  </g>
</svg>
